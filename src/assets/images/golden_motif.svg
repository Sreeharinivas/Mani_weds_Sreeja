<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
    <!-- Outer delicate floral/diamond shape -->
    <path d="M50,5 Q60,40 95,50 Q60,60 50,95 Q40,60 5,50 Q40,40 50,5 Z" fill="rgba(212,175,55,0.1)" stroke="#D4AF37" stroke-width="1.5"/>
    
    <!-- Inner flourishes -->
    <path d="M50,15 Q55,35 85,50 Q55,65 50,85 Q45,65 15,50 Q45,35 50,15 Z" fill="none" stroke="#D4AF37" stroke-width="1" opacity="0.6"/>
    
    <!-- Center and corner accents -->
    <circle cx="50" cy="50" r="4" fill="#D4AF37" />
    <circle cx="50" cy="5" r="2.5" fill="#D4AF37" />
    <circle cx="50" cy="95" r="2.5" fill="#D4AF37" />
    <circle cx="5" cy="50" r="2.5" fill="#D4AF37" />
    <circle cx="95" cy="50" r="2.5" fill="#D4AF37" />
    
    <!-- Diagonal delicate lines -->
    <path d="M30,30 Q50,50 70,70 M30,70 Q50,50 70,30" stroke="#D4AF37" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
</svg>
